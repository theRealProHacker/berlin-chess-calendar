<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Berliner Schachkalender</title>
<style>
  :root{
    --bg:#ffffff; --surface:#f5f5f7; --surface-2:#fbfbfd;
    --ink:#1d1d1f; --ink-2:#6e6e73; --ink-3:#767679;
    --sep:#e3e3e6; --sep-soft:rgba(0,0,0,.06);
    --blue:#0071e3; --blue-hover:#0077ed; --blue-tint:#eaf3ff; --blue-bd:#bcdcff; --link:#06c;
    --green:#1d8a3f; --green-bg:#eaf7ee;
    --amber:#9a6a00; --amber-line:#ecd9a8; --amber-bg:#fffaf0;
    --red:#d70015;
    --r-card:20px; --r-tile:14px; --r-pill:980px;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 8px 30px rgba(0,0,0,.05);
    --shadow-pop:0 6px 20px rgba(0,0,0,.12);
    --shadow-h:0 12px 40px rgba(0,0,0,.10);
    --shadow-modal:0 20px 60px rgba(0,0,0,.22);
    --font:"SF Pro Display","SF Pro Text",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.5;font-size:17px;font-feature-settings:"tnum" 1}
  a{color:var(--link);text-decoration:none}
  .wrap{max-width:940px;margin:0 auto;padding:0 24px}
  svg{display:block}

  .nav{position:sticky;top:0;z-index:100;height:52px;background:rgba(255,255,255,.7);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--sep-soft)}
  .nav .wrap{height:100%;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;letter-spacing:-.01em}
  .brand .mk{width:24px;height:24px;border-radius:7px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:15px;line-height:1}
  .lang{display:inline-flex;border:1px solid var(--sep);border-radius:var(--r-pill);overflow:hidden;font-size:13px}
  .lang button{border:0;background:transparent;padding:5px 12px;color:var(--ink-2);cursor:pointer;font-family:inherit;font-weight:500}
  .lang button.on{background:var(--ink);color:#fff}

  .hero{text-align:center;padding:96px 0 44px}
  .hero h1{font-size:clamp(44px,6.4vw,72px);line-height:1.04;font-weight:700;letter-spacing:-.03em}
  .hero p{margin:24px auto 0;max-width:600px;font-size:22px;line-height:1.4;color:var(--ink-2);letter-spacing:-.01em}

  .toolbar{position:sticky;top:52px;z-index:80;background:rgba(255,255,255,.82);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--sep-soft)}
  .toolbar .wrap{display:flex;align-items:center;gap:12px;height:60px}
  .filter-btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px;border:1px solid var(--sep);
    border-radius:var(--r-pill);background:#fff;color:var(--ink);font:inherit;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:-.01em;transition:.15s}
  .filter-btn:hover{border-color:#c7c7cc;background:var(--surface)}
  .filter-btn svg{width:17px;height:17px;stroke:var(--ink-2)}
  .filter-btn .badge{min-width:20px;height:20px;padding:0 6px;border-radius:var(--r-pill);background:var(--blue);color:#fff;
    font-size:12px;font-weight:600;display:none;align-items:center;justify-content:center}
  .filter-btn.has .badge{display:inline-flex}
  .achips{display:flex;gap:7px;align-items:center;overflow:hidden;flex:1;min-width:0}
  .achip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 7px 0 12px;border-radius:var(--r-pill);
    background:var(--blue-tint);color:var(--blue);border:1px solid var(--blue-bd);font-size:13.5px;font-weight:500;white-space:nowrap;cursor:pointer}
  .achip x{font-size:15px;line-height:1;opacity:.7;font-style:normal}
  .achip:hover x{opacity:1}
  .tb-count{color:var(--ink-2);font-size:14.5px;white-space:nowrap;margin-left:auto}
  .tb-count b{color:var(--ink);font-weight:600}
  .btn-sub{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;border:0;border-radius:var(--r-pill);
    height:40px;padding:0 18px;font:inherit;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:-.01em;white-space:nowrap}
  .btn-sub:hover{background:var(--blue-hover)}
  .btn-sub svg{width:17px;height:17px;stroke:#fff}
  .subnote{color:var(--ink-3);font-size:12.5px;padding:7px 0 0}

  .list{padding:14px 0 80px}
  .month{font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin:36px 0 14px;padding-left:4px}
  .month:first-child{margin-top:18px}
  .card{display:grid;grid-template-columns:1fr auto;background:var(--surface-2);
    border:1px solid var(--sep-soft);border-radius:var(--r-card);margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
  .card-open{display:grid;grid-template-columns:84px 1fr;gap:24px;align-items:center;padding:24px 20px 24px 28px;cursor:pointer;transition:background .15s ease}
  .card-open:hover{background:rgba(0,113,227,.035)}
  .card-open:focus-visible{outline:2px solid var(--blue);outline-offset:-2px}
  .card.expected{background:var(--amber-bg);border-style:dashed;border-color:var(--amber-line)}
  .tile{width:84px;height:84px;border-radius:var(--r-tile);background:#fff;border:1px solid var(--sep-soft);display:grid;place-content:center;text-align:center;line-height:1}
  .tile .mo{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--red)}
  .tile .dy{font-size:30px;font-weight:600;letter-spacing:-.02em;margin-top:5px}
  .tile .rg{font-size:12px;color:var(--ink-3);margin-top:3px}
  .expected .tile .mo{color:var(--amber)}
  .c-mid{min-width:0}
  .c-name{font-size:19px;font-weight:600;letter-spacing:-.015em;line-height:1.25}
  .c-meta{color:var(--ink-2);font-size:15px;margin-top:7px}
  .c-meta b{color:var(--green);font-weight:600}
  .c-meta .dl{color:var(--amber);font-weight:600}
  .rounds{font-size:13.5px;color:var(--ink-2);margin-top:8px}
  .card-side{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:11px;text-align:right;padding:24px 28px 24px 22px;border-left:1px solid var(--sep-soft)}
  .card.expected .card-side{border-left-color:var(--amber-line)}
  .status{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:6px 13px;border-radius:var(--r-pill);white-space:nowrap}
  .status.c{color:var(--green);background:var(--green-bg)}
  .status.e{color:var(--amber);background:#fff4dc}
  .add{font-size:13.5px;color:var(--link);font-weight:500;white-space:nowrap}
  .empty{display:none;text-align:center;color:var(--ink-2);padding:60px 0}
  .empty.on{display:block}

  .scrim{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s ease}
  .scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;z-index:201;background:#fff;box-shadow:var(--shadow-modal);display:flex;flex-direction:column;
    left:50%;top:50%;width:540px;max-width:calc(100vw - 40px);max-height:82vh;border-radius:22px;
    transform:translate(-50%,-46%) scale(.97);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease}
  .sheet.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--sep-soft)}
  .sheet-head h2{font-size:20px;font-weight:600;letter-spacing:-.02em}
  .sheet-x{width:30px;height:30px;border:0;border-radius:50%;background:var(--surface);color:var(--ink-2);font-size:16px;cursor:pointer;font-family:inherit}
  .sheet-x:hover{background:#ececef;color:var(--ink)}
  .sheet-body{overflow:auto;padding:8px 24px 16px}
  .fgroup{padding:16px 0;border-bottom:1px solid var(--sep-soft)}
  .fgroup:last-child{border-bottom:0}
  .flabel{font-size:13px;font-weight:600;color:var(--ink-3);letter-spacing:.03em;text-transform:uppercase;margin-bottom:11px}
  .opts{display:flex;gap:9px;flex-wrap:wrap}
  .opt{height:36px;padding:0 15px;border:1px solid var(--sep);border-radius:var(--r-pill);background:#fff;color:var(--ink-2);
    font:inherit;font-size:14.5px;font-weight:500;cursor:pointer;letter-spacing:-.01em;transition:.12s}
  .opt:hover{border-color:#c7c7cc;color:var(--ink)}
  .opt.sel{background:var(--blue-tint);color:var(--blue);border-color:var(--blue-bd)}
  .card-sub{display:inline-flex;align-items:center;gap:7px;min-height:40px;padding:0 15px;background:transparent;color:var(--blue);border:1px solid var(--blue-bd);border-radius:var(--r-pill);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s ease,border-color .15s ease}
  .card-sub:hover{background:var(--blue-tint);border-color:var(--blue)}
  .card-sub:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .card-sub svg{width:15px;height:15px;stroke:currentColor}
  .card-sub .caret{font-size:10px;opacity:.85}
  .calmenu{position:absolute;z-index:60;width:238px;background:#fff;border:1px solid var(--sep);border-radius:14px;box-shadow:var(--shadow-pop);padding:6px;display:none}
  .calmenu.on{display:block}
  .calrow{display:flex;align-items:center;gap:12px;width:100%;padding:10px 12px;border:0;border-radius:10px;background:none;color:var(--ink);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none}
  .calrow:hover{background:var(--surface)}
  .calrow:focus-visible{outline:2px solid var(--blue);outline-offset:-2px}
  .calrow svg{width:18px;height:18px;flex:none}
  .sheet-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 24px;border-top:1px solid var(--sep-soft)}
  .reset{border:0;background:transparent;color:var(--link);font:inherit;font-size:15px;font-weight:500;cursor:pointer;padding:8px 4px}
  .apply{flex:1;max-width:240px;height:46px;border:0;border-radius:var(--r-pill);background:var(--blue);color:#fff;font:inherit;font-size:16px;font-weight:500;cursor:pointer;letter-spacing:-.01em}
  .apply:hover{background:var(--blue-hover)}

  /* ---- event detail modal (shares .sheet / .scrim) ---- */
  #ev .sheet-head{align-items:flex-start}
  #ev .sheet-head h2{line-height:1.25}
  .ev-top{padding:14px 0 6px}
  .ev-deadline{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--amber);
    background:var(--amber-bg);border:1px solid var(--amber-line);padding:5px 12px;border-radius:var(--r-pill);margin-bottom:14px}
  .ev-daterow{display:flex;align-items:center;justify-content:space-between;gap:14px}
  .ev-date{font-size:17px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
  .ev-meta{color:var(--ink-2);font-size:15.5px;margin-top:11px}
  .ev-sub{color:var(--ink-2);font-size:15px;margin-top:4px}
  .ev-sub b{color:var(--green);font-weight:600}
  .elinks{list-style:none;margin-top:12px}
  .elinks li{border-top:1px solid var(--sep-soft)}
  .elinks li:first-child{border-top:0}
  .elink{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 2px;
    font-size:16.5px;font-weight:500;color:var(--link);letter-spacing:-.01em;transition:color .12s}
  a.elink:hover{color:var(--blue-hover)}
  .elink .rt{display:inline-flex;align-items:center;gap:10px;color:var(--ink-3)}
  .elink .hint{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);
    background:var(--surface);padding:3px 8px;border-radius:6px}
  .elink .ext{width:17px;height:17px;stroke:currentColor;opacity:.85}
  .elink.text{color:var(--ink);cursor:default}
  .elink.text .val{color:var(--ink-2);font-weight:400;font-size:15.5px;text-align:right}
  .elinks .empty{padding:18px 2px;color:var(--ink-3);font-size:15px}

  footer{border-top:1px solid var(--sep-soft);background:var(--surface);padding:40px 0;color:var(--ink-3);font-size:13px}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

  @media(max-width:680px){
    body{font-size:16px}
    .hero{padding:60px 0 32px}
    .toolbar .wrap{height:auto;padding-top:11px;padding-bottom:11px;flex-wrap:wrap}
    .achips{order:3;flex-basis:100%;flex-wrap:wrap}
    .tb-count{display:none}
    .subnote{display:none}
    .card{grid-template-columns:1fr}
    .card-open{grid-template-columns:64px 1fr;gap:16px;padding:16px}
    .card-side{flex-direction:row;justify-content:flex-start;align-items:center;gap:14px;border-left:0;border-top:1px solid var(--sep-soft);padding:12px 16px}
    .card.expected .card-side{border-top-color:var(--amber-line)}
    .tile{width:64px;height:64px} .tile .dy{font-size:24px}
    .sheet{left:0;top:auto;bottom:0;transform:translateY(20px);width:100%;max-width:100%;max-height:88vh;border-radius:22px 22px 0 0}
    .sheet.on{transform:translateY(0)}
    .sheet::before{content:"";position:absolute;top:9px;left:50%;transform:translateX(-50%);width:40px;height:5px;border-radius:3px;background:#d8d8dc}
    .sheet-head{padding-top:24px}
  }
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>
<body>

<nav class="nav"><div class="wrap">
  <div class="brand"><span class="mk">&#9822;</span> <span data-i18n="brand">Berliner Schachkalender</span></div>
  <div class="lang"><button data-lang="de" class="on">DE</button><button data-lang="en">EN</button></div>
</div></nav>

<header class="hero"><div class="wrap">
  <h1 id="heroTitle"></h1>
  <p id="heroSub"></p>
</div></header>

<div class="toolbar"><div class="wrap">
  <button class="filter-btn" id="openFilter" aria-haspopup="dialog">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18l-7 8v6l-4 2v-8z"/></svg>
    <span id="filterLabel">Filter</span> <span class="badge" id="fbadge">0</span>
  </button>
  <div class="achips" id="achips"></div>
  <span class="tb-count"><b id="count">0</b> <span id="countWord">Turniere</span></span>
  <!-- full-calendar subscribe commented out; per-tournament add-to-calendar replaces it
  <button class="btn-sub" id="subBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="3"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>
    <span id="subLabel">Abonnieren</span>
  </button>
  -->
</div>
<!-- <div class="wrap"><div class="subnote" id="subnote"></div></div> -->
</div>

<main class="wrap list" id="list">
  <div class="empty" id="empty"></div>
</main>

<footer><div class="wrap">
  <span id="footL">Berliner Schachkalender · offene Daten · Open Source</span>
  <span id="footR">Quellen: DSB Turnierdatenbank · Berliner Schachverband</span>
</div></footer>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Filter">
  <div class="sheet-head"><h2 id="sheetTitle">Filter</h2><button class="sheet-x" id="closeFilter" aria-label="Close">&times;</button></div>
  <div class="sheet-body" id="sheetBody"></div>
  <div class="sheet-foot"><button class="reset" id="resetFilter">Zurücksetzen</button><button class="apply" id="applyFilter">Anwenden</button></div>
</div>

<div class="sheet ev" id="ev" role="dialog" aria-modal="true" aria-label="Turnierdetails">
  <div class="sheet-head"><h2 id="evName"></h2><button class="sheet-x" id="evClose" aria-label="Close">&times;</button></div>
  <div class="sheet-body">
    <div class="ev-top">
      <div class="ev-deadline" id="evDeadline"></div>
      <div class="ev-daterow"><span class="ev-date" id="evWhen"></span><span id="evStatus"></span></div>
      <div class="ev-meta" id="evMeta"></div>
      <div class="ev-sub" id="evSub"></div>
    </div>
    <ul class="elinks" id="evLinks"></ul>
  </div>
</div>

<div class="calmenu" id="calMenu" role="menu"></div>

<script>
window.TOURNAMENTS = __DATA__;
</script>
<script>
(function(){
  "use strict";

  // ---- i18n: UI chrome + enum labels only; tournament names stay original ----

    de:{
      brand:"Berliner Schachkalender",

      filter:"Filter", subscribe:"Subscribe", reset:"Reset", apply:"Apply", sheetTitle:"Filter",
      countWord:"tournaments",
      subnote:"Your calendar subscription contains exactly this selection — change the filters and your subscription updates automatically.",
      empty:"No tournaments match your filters. Try clearing one.",
      toCal:"Add to calendar", remember:"Remind me", confirmed:"Confirmed", expected:"Expected",
      forecast:"Forecast", notAnnounced:"not yet announced", expectedAround:"expected",
      runden:"rounds", footL:"Berlin Chess Calendar · open data · open source",
      footR:"Sources: DSB tournament database · Berlin Chess Federation",
      months:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
      monthsFull:["January","February","March","April","May","June","July","August","September","October","November","December"],
      bis:"to", prize:"prize fund", deadline:"register by",
      links:{website:"Website",registration:"Registration",chess_results:"Chess Results",ausschreibung:"Announcement"}, noLinks:"No links yet.",
      axisOrder:["region","variant","tc","age","part","format","org"],
      axis:{region:"Region",variant:"Variant",tc:"Time control",age:"Age",part:"Single / Team",format:"Format",org:"Organizer"},
      kind:{open:"Open",championship:"Championship",memorial:"Memorial",league:"League","club-series":"Club series",youth:"Youth",festival:"Festival"},
      variant:{standard:"Standard",chess960:"Chess960",tandem:"Tandem (Bughouse)",other:"Other"},
      tc:{classical:"Classical",rapid:"Rapid",blitz:"Blitz",mixed:"Mixed"},
      part:{single:"Single",duo:"Pairs",team:"Team"},
      format:{block:"Single block",weekly:"Weekly",biweekly:"Fortnightly",other:"Other"},
      region:{berlin:"Berlin",nearby:"Surrounding",national:"National"},
      age:{open:"Open"}
    }
  };

  // axis -> tournament field (and how to read its value(s))
  var AXIS_FIELD = {region:"region",variant:"variant",tc:"time_control",age:"age_limit",part:"participation",format:"schedule_format",org:"organizer"};
  var lang = "de", L = I18N.de;
  var state = {}; // axis -> array of selected values

  function $(id){return document.getElementById(id);}
  function el(tag,cls){var e=document.createElement(tag); if(cls)e.className=cls; return e;}
  function fmtNum(n){return n.toLocaleString(lang==="de"?"de-DE":"en-US");}
  function ddmm(iso){var p=iso.split("-");return p[2]+"."+p[1]+".";}
  function valLabel(axis,v){var m=L[axis]; return (m&&m[v])?m[v]:v;}

  // ---- URL <-> state ----
  function readURL(){
    var q=new URLSearchParams(location.search); state={};
    Object.keys(AXIS_FIELD).forEach(function(ax){
      var raw=q.get(ax); if(raw) state[ax]=raw.split(",").filter(Boolean);
    });
  }
  function stateQuery(){
    var q=new URLSearchParams();
    Object.keys(state).forEach(function(ax){ if(state[ax]&&state[ax].length) q.set(ax,state[ax].join(",")); });
    var s=q.toString(); return s?("?"+s):"";
  }

  // ---- distinct values present in data, per axis (data-driven filter options) ----
  function ageKey(v){ if(v==="open") return -1; var m=/^([UÜ])(\d+)$/.exec(v); return m?(m[1]==="U"?0:1000)+parseInt(m[2],10):9999; }
  function optionsFor(ax){
    var field=AXIS_FIELD[ax], set=[];
    T.forEach(function(t){
      var v=t[field];
      if(Array.isArray(v)) v.forEach(function(x){ if(set.indexOf(x)<0)set.push(x); });
      else if(v!=null && set.indexOf(v)<0) set.push(v);
    });
    if(ax==="age") set.sort(function(a,b){return ageKey(a)-ageKey(b);});  // Offen, U8, U10 … U25, Ü60…
    return set;
  }

  // ---- filtering: OR within an axis, AND across axes ----
  function matches(t){
    return Object.keys(state).every(function(ax){
      var want=state[ax]; if(!want||!want.length) return true;
      var field=AXIS_FIELD[ax], v=t[field];
      if(Array.isArray(v)) return v.some(function(x){return want.indexOf(x)>-1;});
      return want.indexOf(v)>-1;
    });
  }

  // ---- date tile ----
  function tile(t){
    var s=t.start_date.split("-"), e=t.end_date.split("-");
    var mo=L.months[parseInt(s[1],10)-1], day=parseInt(s[2],10);
    var rg="";
    if(t.start_date!==t.end_date){
      if(s[1]===e[1]) rg="–"+parseInt(e[2],10);
      else rg=L.bis+" "+L.months[parseInt(e[1],10)-1];
    }
    var dy = (t.status==="expected"?"~":"")+day;
    return '<div class="tile"><span class="mo">'+mo+'</span><span class="dy">'+dy+'</span>'+(rg?'<span class="rg">'+rg+'</span>':'')+'</div>';
  }

  function metaLine(t){
    var bits=[valLabel("kind",t.kind)];
    if(t.variant!=="standard") bits.push(valLabel("variant",t.variant));
    bits.push(valLabel("tc",t.time_control));
    if(t.prize_pool) bits.push('<b>'+fmtNum(t.prize_pool.amount)+' '+(t.prize_pool.currency==="EUR"?"€":t.prize_pool.currency)+' '+L.prize+'</b>');
    if(t.registration_deadline) bits.push('<span class="dl">'+L.deadline+' '+ddmm(t.registration_deadline)+'</span>');
    if(t.organizer) bits.push(t.organizer); else if(t.venue) bits.push(t.venue);
    return bits.join(" · ");
  }

  function roundsLine(t){
    var parts=[];
    if(t.schedule_format!=="block"){
      parts.push(valLabel("format",t.schedule_format));
      parts.push(ddmm(t.start_date)+" – "+ddmm(t.end_date)+t.end_date.split("-")[0]);
    }
    var rc=t.rounds_count!=null?t.rounds_count:(t.rounds?t.rounds.length:null);
    if(rc!=null) parts.push(rc+" "+L.runden);
    return parts.length?'<div class="rounds">'+parts.join(" · ")+'</div>':"";
  }

  function sectionOf(t){
    var p=t.start_date.split("-");
    if(t.status==="expected") return L.forecast+" · "+p[0];
    return L.monthsFull[parseInt(p[1],10)-1]+" "+p[0];
  }

  function nameOf(t){ return t.name; }

  // ---- event detail modal: header (deadline · date · format · organizer) + bullet-less links ----
  var EXT='<svg class="ext" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>';
  function esc(s){return String(s).replace(/[&<>"]/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch];});}
  function longDate(iso){var p=iso.split("-");return parseInt(p[2],10)+". "+L.monthsFull[parseInt(p[1],10)-1]+" "+p[0];}
  function evDateRange(t){
    var s=t.start_date.split("-"), e=t.end_date.split("-"), pre=(t.status==="expected")?"~ ":"";
    var dS=parseInt(s[2],10), dE=parseInt(e[2],10), mS=L.monthsFull[parseInt(s[1],10)-1], mE=L.monthsFull[parseInt(e[1],10)-1];
    if(t.start_date===t.end_date) return pre+dS+". "+mS+" "+s[0];
    if(s[0]===e[0]&&s[1]===e[1]) return pre+dS+". – "+dE+". "+mS+" "+s[0];
    if(s[0]===e[0]) return pre+dS+". "+mS+" – "+dE+". "+mE+" "+s[0];
    return pre+longDate(t.start_date)+" – "+longDate(t.end_date);
  }
  function linkRow(label,val,hint){
    // a URL -> link row; any other text (e.g. "über Qualifikation") -> plain-text row
    if(/^https?:\/\//i.test(val))
      return '<li><a class="elink" href="'+esc(val)+'" target="_blank" rel="noopener"><span class="lk">'+label+
             '</span><span class="rt">'+(hint?'<span class="hint">'+hint+'</span>':'')+EXT+'</span></a></li>';
    return '<li><div class="elink text"><span class="lk">'+label+'</span><span class="val">'+esc(val)+'</span></div></li>';
  }
  // ---- add to calendar (per event) ----------------------------------------
  // icsEvent() MUST mirror bcc.build._vevent's ALL-DAY form: DTSTART;VALUE=DATE and
  // DTEND;VALUE=DATE = end_date + 1 (RFC-5545 exclusive end). Contract pinned by
  // tests/test_build.py TestIcs.test_dtend_exclusive — keep the two in sync.
  function ymd(iso){ return iso.replace(/-/g,""); }
  function nextDay(iso){ var d=new Date(iso+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+1); return d.toISOString().slice(0,10); }
  function icsEsc(s){ return String(s).replace(/([\\;,])/g,"\\$1").replace(/\n/g,"\\n"); }
  function calTitle(t){ return (t.status==="expected"?"[erwartet] ":"")+nameOf(t); }
  function calLoc(t){ return [t.venue,t.city].filter(Boolean).join(", "); }
  function calDesc(t){
    var b=[valLabel("kind",t.kind)];
    if(t.organizer) b.push(t.organizer);
    if(t.status==="expected") b.push(lang==="de"?"erwartet, noch nicht bestätigt":"expected, not yet announced");
    var d=b.join(" · ");
    if(t.source_url) d+="\n\n"+t.source_url;
    return d;
  }
  function icsEvent(t){
    var lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Berliner Schachkalender//bcc//DE","CALSCALE:GREGORIAN","METHOD:PUBLISH",
      "BEGIN:VEVENT","UID:"+t.id+"@berliner-schachkalender","DTSTAMP:"+ymd(t.last_verified||t.start_date)+"T000000Z",
      "DTSTART;VALUE=DATE:"+ymd(t.start_date),"DTEND;VALUE=DATE:"+ymd(nextDay(t.end_date)),
      "SUMMARY:"+icsEsc(calTitle(t)),"DESCRIPTION:"+icsEsc(calDesc(t))];
    if(calLoc(t)) lines.push("LOCATION:"+icsEsc(calLoc(t)));
    lines.push("STATUS:"+(t.status==="expected"?"TENTATIVE":t.status==="cancelled"?"CANCELLED":"CONFIRMED"),
      "TRANSP:TRANSPARENT","END:VEVENT","END:VCALENDAR");
    return lines.join("\r\n")+"\r\n";
  }
  function qs(pairs){ return pairs.map(function(p){return p[0]+"="+encodeURIComponent(p[1]);}).join("&"); }
  function gcalHref(t){
    return "https://calendar.google.com/calendar/render?"+qs([["action","TEMPLATE"],["text",calTitle(t)],
      ["dates",ymd(t.start_date)+"/"+ymd(nextDay(t.end_date))],["details",calDesc(t)],["location",calLoc(t)],["ctz","Europe/Berlin"]]);
  }
  function outlookHref(t){
    return "https://outlook.live.com/calendar/0/deeplink/compose?"+qs([["path","/calendar/action/compose"],["rru","addevent"],
      ["allday","true"],["subject",calTitle(t)],["startdt",t.start_date],["enddt",nextDay(t.end_date)],["body",calDesc(t)],["location",calLoc(t)]]);
  }
  function downloadIcs(t){
    var url=URL.createObjectURL(new Blob([icsEvent(t)],{type:"text/calendar;charset=utf-8"}));
    var a=document.createElement("a"); a.href=url; a.download=t.id+".ics";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); },2000);
  }
  // full-color provider logo marks for the add-to-calendar menu
  var CAL_G='<svg viewBox="0 0 48 48"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>';
  var CAL_O='<svg viewBox="0 0 24 24"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#7FBA00" d="M13 1h10v10H13z"/><path fill="#00A4EF" d="M1 13h10v10H1z"/><path fill="#FFB900" d="M13 13h10v10H13z"/></svg>';
  var CAL_A='<svg viewBox="0 0 24 24"><path fill="#000" d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.043 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"/></svg>';
  // one shared popover, repositioned to the clicked card's button (not one menu per card)
  function openCalMenu(t, anchor){
    var m=$("calMenu");
    m.innerHTML='<a class="calrow" role="menuitem" target="_blank" rel="noopener" href="'+esc(gcalHref(t))+'">'+CAL_G+'Google Kalender</a>'+
      '<a class="calrow" role="menuitem" target="_blank" rel="noopener" href="'+esc(outlookHref(t))+'">'+CAL_O+'Outlook</a>'+
      '<button class="calrow" role="menuitem" id="calIcs">'+CAL_A+'Apple (.ics)</button>';
    $("calIcs").onclick=function(){ downloadIcs(t); m.classList.remove("on"); };
    var r=anchor.getBoundingClientRect(), left=window.scrollX+r.right-238;  // 238 = .calmenu width
    if(left<8) left=8;
    m.style.left=left+"px"; m.style.top=(window.scrollY+r.bottom+6)+"px";
    m.classList.add("on");
  }
  // close the calendar menu on any click outside it or a card icon (registered once)
  document.addEventListener("click",function(e){
    var m=$("calMenu");
    if(m.classList.contains("on") && !e.target.closest("#calMenu") && !e.target.closest(".card-sub")) m.classList.remove("on");
  });

  function openEvent(t){
    $("evName").textContent=nameOf(t);
    var dl=$("evDeadline");
    if(t.registration_deadline){ dl.textContent=L.deadline+" "+longDate(t.registration_deadline); dl.style.display=""; }
    else dl.style.display="none";
    $("evWhen").textContent=evDateRange(t);
    var sc=t.status==="expected"?"e":"c", dot=t.status==="expected"?"◌":"●", txt=t.status==="expected"?L.expected:L.confirmed;
    $("evStatus").innerHTML='<span class="status '+sc+'">'+dot+' '+txt+'</span>';
    var bits=[valLabel("kind",t.kind)];
    if(t.variant!=="standard") bits.push(valLabel("variant",t.variant));
    bits.push(valLabel("tc",t.time_control));
    if(t.participation!=="single") bits.push(valLabel("part",t.participation));
    if(t.schedule_format!=="block") bits.push(valLabel("format",t.schedule_format));
    $("evMeta").textContent=bits.join(" · ");
    var sub=[], who=t.organizer||t.venue||t.city;
    if(who) sub.push(esc(who));
    if(t.prize_pool) sub.push('<b>'+fmtNum(t.prize_pool.amount)+' '+(t.prize_pool.currency==="EUR"?"€":t.prize_pool.currency)+' '+L.prize+'</b>');
    var subEl=$("evSub"); subEl.innerHTML=sub.join(" · "); subEl.style.display=sub.length?"":"none";
    var LL=L.links, rows="";
    if(t.source_url) rows+=linkRow(LL.website,t.source_url);
    if(t.registration) rows+=linkRow(LL.registration,t.registration);
    if(t.chess_results_url) rows+=linkRow(LL.chess_results,t.chess_results_url);
    if(t.ausschreibung_url) rows+=linkRow(LL.ausschreibung,t.ausschreibung_url,"PDF");
    $("evLinks").innerHTML = rows || '<li class="empty">'+L.noLinks+'</li>';
    $("scrim").classList.add("on"); $("ev").classList.add("on");
  }

  function render(){
    var list=$("list");
    // clear everything except the empty node
    [].slice.call(list.querySelectorAll(".month,.card")).forEach(function(n){n.remove();});
    // MUST mirror bcc.build.visible() exactly, so the .ics subscription matches what's listed:
    // drop stale + events ended >30 days ago, then render a predicted (expected) edition only for a
    // series with NO confirmed edition in view (one predict per series, the earliest).
    var cutoff=(function(){var d=new Date();d.setDate(d.getDate()-30);return d.toISOString().slice(0,10);})();
    var items=T.filter(matches).filter(function(t){return t.status!=="stale"&&t.end_date>=cutoff;})
      .slice().sort(function(a,b){return a.start_date<b.start_date?-1:a.start_date>b.start_date?1:(a.id<b.id?-1:1);});
    var shownSeries={}, predicted={};
    items.forEach(function(t){ if(t.status!=="expected") shownSeries[t.series]=true; });
    items=items.filter(function(t){
      if(t.status!=="expected") return true;
      if(shownSeries[t.series]||predicted[t.series]) return false;
      predicted[t.series]=true; return true;
    });
    var emptyNode=$("empty");
    var curSection=null;
    items.forEach(function(t){
      var sec=sectionOf(t);
      if(sec!==curSection){ var h=el("div","month"); h.textContent=sec; list.insertBefore(h,emptyNode); curSection=sec; }
      var c=el("article","card"+(t.status==="expected"?" expected":""));
      var statusCls=t.status==="expected"?"e":"c";
      var dot=t.status==="expected"?"◌":"●";
      var statusTxt=t.status==="expected"?L.expected:L.confirmed;
      c.innerHTML =
        '<div class="card-open" tabindex="0" role="button" aria-label="'+esc(nameOf(t))+'">'+
          tile(t) +
          '<div class="c-mid"><div class="c-name">'+nameOf(t)+'</div><div class="c-meta">'+metaLine(t)+'</div>'+roundsLine(t)+'</div>'+
        '</div>'+
        '<div class="card-side"><span class="status '+statusCls+'">'+dot+' '+statusTxt+'</span>'+
          '<button class="card-sub" aria-haspopup="true" aria-label="'+esc(L.subscribe+" – "+nameOf(t))+'"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="3"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>'+esc(L.subscribe)+' <span class="caret">&#9662;</span></button></div>';
      var op=c.querySelector(".card-open");
      op.onclick=function(){ openEvent(t); };
      op.onkeydown=function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openEvent(t); } };
      var cc=c.querySelector(".card-sub"); if(cc) cc.onclick=function(e){ e.stopPropagation(); openCalMenu(t,this); };
      list.insertBefore(c,emptyNode);
    });
    $("count").textContent=items.length;
    emptyNode.textContent=L.empty;
    emptyNode.classList.toggle("on",items.length===0);
    renderChips();
    // full-calendar subscribe commented out (per-tournament add-to-calendar replaces it):
    // $("subBtn").onclick=function(){ location.href="calendar.ics"+stateQuery(); };
    // $("subBtn").title=(lang==="de"?"Abonniert genau diese ":"Subscribes to exactly these ")+items.length+(lang==="de"?" Turniere":" tournaments");
    // reflect filters in the page URL without reloading
    history.replaceState(null,"",stateQuery()||location.pathname);
  }

  function renderChips(){
    var box=$("achips"); box.innerHTML=""; var n=0;
    Object.keys(state).forEach(function(ax){ (state[ax]||[]).forEach(function(v){
      n++;
      var b=el("button","achip"); b.innerHTML=valLabel(ax,v)+' <x>×</x>';
      b.onclick=function(){ state[ax]=state[ax].filter(function(x){return x!==v;}); if(!state[ax].length)delete state[ax]; syncModal(); render(); };
      box.appendChild(b);
    });});
    var fb=$("openFilter"); $("fbadge").textContent=n; fb.classList.toggle("has",n>0);
  }

  // ---- modal ----
  function buildModal(){
    var body=$("sheetBody"); body.innerHTML="";
    L.axisOrder.forEach(function(ax){
      var opts=optionsFor(ax); if(!opts.length) return;
      var g=el("div","fgroup");
      g.innerHTML='<div class="flabel">'+L.axis[ax]+'</div>';
      var row=el("div","opts");
      opts.forEach(function(v){
        var o=el("button","opt"+((state[ax]&&state[ax].indexOf(v)>-1)?" sel":""));
        o.textContent=valLabel(ax,v); o.dataset.ax=ax; o.dataset.val=v;
        o.onclick=function(){ o.classList.toggle("sel"); };
        row.appendChild(o);
      });
      g.appendChild(row); body.appendChild(g);
    });
  }
  function syncModal(){ // refresh selected classes from state (after chip removal)
    [].slice.call(document.querySelectorAll("#sheetBody .opt")).forEach(function(o){
      var ax=o.dataset.ax,v=o.dataset.val; o.classList.toggle("sel",!!(state[ax]&&state[ax].indexOf(v)>-1));
    });
  }
  function collectModal(){
    state={};
    [].slice.call(document.querySelectorAll("#sheetBody .opt.sel")).forEach(function(o){
      (state[o.dataset.ax]=state[o.dataset.ax]||[]).push(o.dataset.val);
    });
  }
  function openModal(){ buildModal(); $("scrim").classList.add("on"); $("sheet").classList.add("on"); }
  function closeModal(){ $("scrim").classList.remove("on"); $("sheet").classList.remove("on"); }

  // ---- language ----
  function setLang(lng){
    lang=lng; L=I18N[lng]; document.documentElement.lang=lng;
    document.querySelectorAll("[data-lang]").forEach(function(b){b.classList.toggle("on",b.dataset.lang===lng);});
    $("heroTitle").innerHTML=L.heroTitle; $("heroSub").textContent=L.heroSub;
    $("filterLabel").textContent=L.filter;   // subLabel/subnote refs removed (subscribe commented out)
    $("countWord").textContent=L.countWord;
    $("sheetTitle").textContent=L.sheetTitle; $("resetFilter").textContent=L.reset; $("applyFilter").textContent=L.apply;
    $("footL").textContent=L.footL; $("footR").textContent=L.footR;
    document.querySelector('[data-i18n=brand]').textContent=L.brand;
    render();
  }

  // ---- wire up ----
  function closeAll(){ closeModal(); $("ev").classList.remove("on"); }
  $("openFilter").onclick=openModal;
  $("closeFilter").onclick=closeModal;
  $("evClose").onclick=closeAll;
  $("scrim").onclick=closeAll;
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeAll();});
  $("applyFilter").onclick=function(){ collectModal(); closeModal(); render(); };
  $("resetFilter").onclick=function(){ state={}; buildModal(); render(); };
  document.querySelectorAll("[data-lang]").forEach(function(b){ b.onclick=function(){setLang(b.dataset.lang);}; });

  readURL();
  setLang("de");
})();
</script>
